name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B -Dspring.profiles.active=test clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  build-images:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        run: |
          echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lower }}/billing-backend:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lower }}/billing-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lower }}/billing-frontend:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lower }}/billing-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Boot full stack via docker-compose
        run: docker compose -f docker-compose.yml up -d --build postgres backend

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "backend failed to become healthy"; docker compose logs; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    needs: [build-images, integration-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
 
      - name: Skip deploy if KUBE_CONFIG secret missing
        if: ${{ secrets.KUBE_CONFIG == '' }}
        run: |
          echo "KUBE_CONFIG secret is not defined. Skipping deploy."

      - name: Configure kubectl
        if: ${{ secrets.KUBE_CONFIG != '' }}
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply manifests
        if: ${{ secrets.KUBE_CONFIG != '' }}
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-config-secrets.yaml
          kubectl apply -f k8s/02-postgres.yaml
          kubectl apply -f k8s/03-backend.yaml
          kubectl apply -f k8s/04-frontend.yaml

      - name: Compute lowercase owner
        if: ${{ secrets.KUBE_CONFIG != '' }}
        id: owner
        run: |
          echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Roll out new images
        if: ${{ secrets.KUBE_CONFIG != '' }}
          kubectl set image deployment/billing-frontend billing-frontend=ghcr.io/${{ steps.owner.outputs.owner_lower }}/billing-frontend:${{ github.sha }} -n billing-engine
          kubectl rollout status deployment/billing-backend -n billing-engine
          kubectl rollout status deployment/billing-frontend -n billing-engine
