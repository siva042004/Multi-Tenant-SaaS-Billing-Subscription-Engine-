apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-config
  namespace: billing-engine
data:
  DB_URL: "jdbc:postgresql://postgres:5432/billing"
  DB_USER: "billing"
  CORS_ALLOWED_ORIGINS: "https://billing.example.com"
---
# In production, create this via `kubectl create secret` or a secrets manager
# (AWS Secrets Manager + External Secrets Operator, Sealed Secrets, etc.)
# rather than committing real values. Placeholders shown for local/dev use only.
apiVersion: v1
kind: Secret
metadata:
  name: billing-secrets
  namespace: billing-engine
type: Opaque
stringData:
  DB_PASSWORD: "changeme"
  STRIPE_API_KEY: "sk_test_placeholder"
  STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
